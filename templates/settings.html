{% extends "base.html" %}
{% block title %}Settings – PayCheck Analyzer{% endblock %}
{% block content %}
<h1>Settings</h1>
<form method="post" action="{{ url_for('settings') }}">
  <div class="form-group">
    <label for="currency">Currency</label>
    <select id="currency" name="currency">
      {% for code in currencies %}
      <option value="{{ code }}" {% if code == current_currency %}selected{% endif %}>{{ code }}</option>
      {% endfor %}
    </select>
    <p class="form-hint">All costs are displayed in this currency. Set once; no per-cost currency.</p>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
