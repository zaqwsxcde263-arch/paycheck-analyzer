<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PayCheck Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('add_paycheck') }}">Add Paycheck</a>
      <a href="{{ url_for('categories_list') }}">Categories</a>
      <a href="{{ url_for('products_list') }}">Products</a>
      <a href="{{ url_for('product_trends') }}">Product Trends</a>
      <a href="{{ url_for('settings') }}">Settings</a>
    </nav>
    <span class="currency-badge">Currency: {{ currency or 'USD' }}</span>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
