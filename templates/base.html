<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paycheck Analyzer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <style>
      body {
        padding-top: 4.5rem;
      }
      .form-error {
        font-size: 0.875rem;
        color: #dc3545;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('add_expense') }}">Paycheck Analyzer</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'add_expense' %}active{% endif %}"
                 href="{{ url_for('add_expense') }}">Add item</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'dashboard_summary' %}active{% endif %}"
                 href="{{ url_for('dashboard_summary') }}">Summary dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'dashboard_product_trends' %}active{% endif %}"
                 href="{{ url_for('dashboard_product_trends') }}">Product trends</a>
            </li>
          </ul>
          <form class="d-flex" method="post" action="{{ url_for('set_currency') }}">
            <label class="me-2 text-white-50">Currency</label>
            <select class="form-select form-select-sm me-2" name="currency" onchange="this.form.submit()">
              {% for c in supported_currencies %}
                <option value="{{ c }}" {% if c == current_currency %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </form>
        </div>
      </div>
    </nav>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
