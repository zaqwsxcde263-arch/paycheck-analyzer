{% extends "base.html" %}
{% block title %}{{ 'Edit category' if category else 'Add category' }} – PayCheck Analyzer{% endblock %}
{% block content %}
<h1>{{ 'Edit category' if category else 'Add category' }}</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{{ url_for('category_edit', category_id=category.id) if category else url_for('category_add') }}">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ name or (category.name if category else '') }}" required>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('categories_list') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
